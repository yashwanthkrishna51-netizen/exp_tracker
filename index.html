<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>expense.io - Track Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.294.0/font/lucide.min.css">
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f5;
  --bg-elevated: #ffffff;
  --text-primary: #0a0a0a;
  --text-secondary: #666666;
  --text-tertiary: #999999;
  --border-light: #e0e0e0;
  --border-medium: #cccccc;
  --accent-primary: #FF6B35;
  --accent-hover: #E55A2B;
  --accent-light: #FFF4F0;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}
[data-theme="dark"] {
  --bg-primary: #000000;
  --bg-secondary: #0a0a0a;
  --bg-elevated: #1a1a1a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-tertiary: #666666;
  --border-light: #2a2a2a;
  --border-medium: #3a3a3a;
  --accent-light: #2a1a15;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.5);
}
* {margin: 0; padding: 0; box-sizing: border-box;}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  transition: background 0.3s, color 0.3s;
}
.app-container {display: flex; min-height: 100vh;}
.sidebar {
  width: 260px;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border-light);
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s;
  position: fixed;
  height: 100vh;
  z-index: 100;
}
.sidebar.collapsed {transform: translateX(-260px);}
.sidebar-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.sidebar-overlay.active {
  display: block;
  opacity: 1;
}
.logo-area {
  padding: 0 24px 24px;
  border-bottom: 1px solid var(--border-light);
}
.logo {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-menu {flex: 1; padding: 16px 12px;}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  width: 100%;
  transition: all 0.2s;
  margin-bottom: 4px;
}
.nav-item:hover {background: var(--bg-secondary); color: var(--text-primary);}
.nav-item.active {background: var(--accent-light); color: var(--accent-primary);}
.nav-item i {font-size: 20px;}
.main-content {
  flex: 1;
  margin-left: 260px;
  transition: margin-left 0.3s;
}
.main-content.expanded {margin-left: 0;}
.top-bar {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-light);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.top-left {display: flex; align-items: center; gap: 16px; flex: 1;}
.menu-toggle {
  background: none;
  border: none;
  color: var(--text-primary);
  cursor: pointer;
  font-size: 24px;
  padding: 8px;
  border-radius: var(--radius-sm);
  display: none;
}
.menu-toggle:hover {background: var(--bg-secondary);}
.page-title {font-size: 20px; font-weight: 600;}
.month-picker {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}
.month-picker button {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
}
.month-picker button:hover {color: var(--text-primary);}
.month-picker span {
  font-size: 14px;
  font-weight: 600;
  min-width: 120px;
  text-align: center;
}
.search-bar {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.search-bar input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 14px;
}
.search-bar i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 18px;
}
.top-actions {display: flex; align-items: center; gap: 12px;}
.sync-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.sync-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}
.sync-dot.syncing {background: var(--warning); animation: pulse 1.5s infinite;}
.sync-dot.error {background: var(--danger);}
@keyframes pulse {
  0%, 100% {opacity: 1;}
  50% {opacity: 0.5;}
}
.btn {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: inherit;
}
.btn-primary {
  background: var(--accent-primary);
  color: white;
}
.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
}
.btn-secondary:hover {background: var(--bg-primary);}
.btn i {font-size: 18px;}
.content-area {padding: 24px; max-width: 1400px;}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.stat-label {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 500;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}
.stat-change {
  font-size: 13px;
  color: var(--text-tertiary);
}
.stat-change.positive {color: var(--success);}
.stat-change.negative {color: var(--danger);}
.widget {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
}
.widget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.widget-title {
  font-size: 16px;
  font-weight: 600;
}
.widget-action {
  font-size: 14px;
  color: var(--accent-primary);
  cursor: pointer;
  font-weight: 500;
}
.widget-action:hover {text-decoration: underline;}
.chart-toggle {
  display: flex;
  gap: 8px;
  background: var(--bg-secondary);
  padding: 4px;
  border-radius: var(--radius-sm);
}
.chart-toggle button {
  padding: 6px 12px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}
.chart-toggle button.active {
  background: var(--bg-elevated);
  color: var(--accent-primary);
}
.filters-bar {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.filter-group {display: flex; flex-direction: column; gap: 4px; min-width: 150px;}
.filter-label {font-size: 12px; color: var(--text-secondary); font-weight: 600;}
.filter-input {
  padding: 8px 12px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 14px;
}
.expense-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.2s;
  cursor: pointer;
}
.expense-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.expense-card.selected {
  border-color: var(--accent-primary);
  background: var(--accent-light);
}
.expense-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.expense-details {flex: 1;}
.expense-name {font-size: 15px; font-weight: 600; margin-bottom: 4px;}
.expense-meta {font-size: 13px; color: var(--text-secondary);}
.expense-amount {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}
.expense-amount.high {color: var(--danger);}
.expense-actions {display: flex; gap: 8px;}
.expense-actions button {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 20px;
  padding: 8px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.expense-actions button:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}
.expense-checkbox {
  width: 20px;
  height: 20px;
  cursor: pointer;
}
.bulk-actions {
  background: var(--accent-light);
  border: 1px solid var(--accent-primary);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  justify-content: space-between;
}
.bulk-actions.active {display: flex;}
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  padding: 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
}
.pagination-info {font-size: 14px; color: var(--text-secondary);}
.pagination-controls {display: flex; gap: 8px; align-items: center;}
.pagination-controls button {
  padding: 8px 12px;
  border: 1px solid var(--border-light);
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
}
.pagination-controls button:hover:not(:disabled) {background: var(--bg-elevated);}
.pagination-controls button:disabled {opacity: 0.5; cursor: not-allowed;}
.pagination-controls button.active {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
}
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.active {display: flex;}
.modal {
  background: var(--bg-elevated);
  border-radius: var(--radius-lg);
  max-width: 500px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title {font-size: 18px; font-weight: 600;}
.modal-close {
  background: none;
  border: none;
  font-size: 28px;
  color: var(--text-secondary);
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}
.modal-close:hover {background: var(--bg-secondary);}
.modal-body {padding: 24px;}
.form-group {margin-bottom: 20px;}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
}
.form-input:focus {
  outline: none;
  border-color: var(--accent-primary);
}
.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.category-btn {
  padding: 12px;
  border: 2px solid var(--border-light);
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
}
.category-btn:hover {
  border-color: var(--accent-primary);
  background: var(--accent-light);
}
.category-btn.selected {
  border-color: var(--accent-primary);
  background: var(--accent-primary);
  color: white;
}
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-elevated);
  color: var(--text-primary);
  padding: 14px 18px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-light);
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 2000;
  animation: slideIn 0.3s;
}
.toast.active {display: flex;}
.toast.success {border-color: var(--success);}
.toast.error {border-color: var(--danger);}
@keyframes slideIn {
  from {transform: translateY(100px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}
.debug-button {
  position: fixed;
  bottom: 32px;
  right: 32px;
  top: auto;
  left: auto;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent-primary);
  color: white;
  border: none;
  font-size: 20px;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.debug-button:hover {transform: scale(1.1);}
@media (max-width: 768px) {
  .sidebar {transform: translateX(-260px);}
  .sidebar.open {transform: translateX(0);}
  .main-content {margin-left: 0;}
  .menu-toggle {display: block;}
  .search-bar {max-width: none; flex: 1;}
  .top-bar {flex-wrap: wrap;}
  .stat-grid {grid-template-columns: repeat(2, 1fr);}
  .category-grid {grid-template-columns: repeat(2, 1fr);}
  .filters-bar {flex-direction: column;}
  .filter-group {width: 100%;}
  .debug-button {
    bottom: 32px;
    right: 32px;
    width: 44px;
    height: 44px;
  }
  .sidebar-overlay.active {
    display: block;
  }
}
@media (min-width: 769px) {
  .sidebar-overlay {
    display: none !important;
  }
}
}
</style>
</head>
<body>
<div class="app-container">
  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo">
        <i data-lucide="wallet"></i>
        expense.io
      </div>
    </div>
    <nav class="nav-menu">
      <button class="nav-item active" data-view="dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="expenses">
        <i data-lucide="receipt"></i>
        <span>Expenses</span>
      </button>
      <button class="nav-item" data-view="analytics">
        <i data-lucide="bar-chart-3"></i>
        <span>Analytics</span>
      </button>
      <button class="nav-item" data-view="budget">
        <i data-lucide="target"></i>
        <span>Budget</span>
      </button>
      <button class="nav-item" data-view="export">
        <i data-lucide="download"></i>
        <span>Export</span>
      </button>
    </nav>
    <div style="padding: 12px;">
      <button class="btn btn-secondary" onclick="openSettingsModal()" style="width: 100%; justify-content: center;">
        <i data-lucide="settings"></i>
        Settings
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-left">
        <button class="menu-toggle" id="menuToggle">
          <i data-lucide="menu"></i>
        </button>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
        <div class="month-picker">
          <button onclick="prevMonth()"><i data-lucide="chevron-left"></i></button>
          <span id="monthDisplay">May 2026</span>
          <button onclick="nextMonth()"><i data-lucide="chevron-right"></i></button>
        </div>
      </div>
      <div class="search-bar">
        <i data-lucide="search"></i>
        <input type="text" id="globalSearch" placeholder="Search expenses..." onkeyup="handleGlobalSearch()">
      </div>
      <div class="top-actions">
        <div class="sync-status">
          <span class="sync-dot" id="syncDot"></span>
          <span id="syncText">Ready</span>
        </div>
        <div class="sync-status" id="usernameDisplay" style="display:none">
          <i data-lucide="user"></i>
          <span id="currentUsername">...</span>
        </div>
        <button class="btn btn-primary" id="addExpenseBtn" onclick="openAddExpenseModal()">
          <i data-lucide="plus"></i>
          Add Expense
        </button>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area" id="contentArea">
      Loading...
    </div>
  </main>
</div>
<!-- Add Expense Modal -->
<div class="modal-overlay" id="addExpenseModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Add Expense</h2>
      <button class="modal-close" onclick="closeAddExpenseModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="expenseForm">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="dateInput" required>
        </div>
        <div class="form-group">
          <label class="form-label">Category *</label>
          <div class="category-grid" id="categoryGrid"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Card/Payment Method</label>
          <select class="form-input" id="cardSelect" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₹)</label>
          <input type="number" class="form-input" id="amountInput" step="0.01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Comment</label>
          <input type="text" class="form-input" id="descInput" placeholder="Optional note">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
          <i data-lucide="check"></i>
          Save Expense
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Settings</h2>
      <button class="modal-close" onclick="closeSettingsModal()">×</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
      <button class="btn btn-secondary" onclick="toggleTheme()" style="width:100%;justify-content:center">
        <i data-lucide="moon" id="themeIcon"></i>
        <span id="themeText">Dark Mode</span>
      </button>
      
      <div class="form-group">
        <label class="form-label">Font Size</label>
        <select class="form-input" id="fontSizeSelect" onchange="changeFontSize()">
          <option value="14">Small</option>
          <option value="16" selected>Medium</option>
          <option value="18">Large</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Currency Symbol</label>
        <select class="form-input" id="currencySelect" onchange="changeCurrency()">
          <option value="₹" selected>₹ (Rupee)</option>
          <option value="$">$ (Dollar)</option>
          <option value="€">€ (Euro)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Default Category</label>
        <select class="form-input" id="defaultCategorySelect"></select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Default Card</label>
        <select class="form-input" id="defaultCardSelect"></select>
      </div>
      
      <button class="btn btn-secondary" onclick="closeSettingsModal();switchView('export')" style="width:100%;justify-content:center">
        <i data-lucide="download"></i>
        Export Data
      </button>

<script>
// Core Data & Config - PRESERVE ALL AUTH
const CATS=['Pets','Home','Electronics','Telecom','Transport','EMI','Travel','Dining','Health','Insurance','Jewellery','Investment','UPI/Cash','Fuel','Groceries','Misc'];
const DEFAULTS={owner:'YOUR_GITHUB_USERNAME',repo:'YOUR_DATA_REPO_NAME',branch:'main',path:'expenses'};
const _envToken='';
let currentView='dashboard';
let selectedCategory='';
let currentMonth=new Date().toISOString().slice(0,7);
let currentUser=null;
let idleTimer=null;
let idleTimeout=5*60*1000;
let CACHE=JSON.parse(localStorage.getItem('spent_cache')||'{}');
let BUDGETS=JSON.parse(localStorage.getItem('spent_budgets')||'{"monthly":50000,"categories":{}}');
const _saved=JSON.parse(localStorage.getItem('spent_cfg')||'{}');
let CFG={owner:_saved.owner||DEFAULTS.owner,repo:_saved.repo||DEFAULTS.repo,token:_envToken||_saved.token||'',branch:_saved.branch||DEFAULTS.branch,path:_saved.path||DEFAULTS.path};

// Safe Lucide initialization
function initLucideIcons(){
  if(typeof lucide !== 'undefined'){
    initLucideIcons();
  }
}
window.initLucideIcons = initLucideIcons;

// Settings
let currencySymbol = localStorage.getItem('currency') || '₹';
let fontSize = localStorage.getItem('fontSize') || '16';

// Expenses View State
let viewMode = 'card';
let entriesPerPage = 20;
let currentPage = 1;
let sortBy = 'date';
let sortOrder = 'desc';
let filters = {search: '', category: '', card: '', minAmount: '', maxAmount: ''};
let selectedExpenses = new Set();

// Analytics State
let trendView = 'daily';
let categoryChartType = 'pie';

// Utility Functions
const fmt = n => currencySymbol + Number(n).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const monthStr = () => todayStr().slice(0,7);
const formatDate = d => new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
const getCards = () => JSON.parse(localStorage.getItem('spent_cards')||'["ICICI Rupay","OneCard","Axis Indian Oil","Axis Flipkart","Cash","UPI"]');
const saveCacheLocal = () => localStorage.setItem('spent_cache', JSON.stringify(CACHE));
const cfgOk = () => CFG.owner && CFG.repo && CFG.token;

// Category Colors & Icons
const getCatColor = cat => {
  const colors = {
    'Pets':'#10b981','Home':'#3b82f6','Electronics':'#8b5cf6','Telecom':'#06b6d4',
    'Transport':'#f59e0b','EMI':'#ef4444','Travel':'#14b8a6','Dining':'#ec4899',
    'Health':'#84cc16','Insurance':'#6366f1','Jewellery':'#d946ef','Investment':'#22c55e',
    'UPI/Cash':'#737373','Fuel':'#f97316','Groceries':'#65a30d','Misc':'#94a3b8'
  };
  return colors[cat] || '#94a3b8';
};

const getCatIcon = cat => {
  const icons = {
    'Pets':'dog','Home':'home','Electronics':'smartphone','Telecom':'phone',
    'Transport':'car','EMI':'credit-card','Travel':'plane','Dining':'utensils',
    'Health':'heart-pulse','Insurance':'shield','Jewellery':'gem','Investment':'trending-up',
    'UPI/Cash':'wallet','Fuel':'fuel','Groceries':'shopping-cart','Misc':'more-horizontal'
  };
  return icons[cat] || 'circle';
};

// Sync & GitHub Functions - PRESERVE EXACTLY
function setSync(state,msg){
  const d=document.getElementById('syncDot'),t=document.getElementById('syncText');
  if(!d||!t)return;
  d.className=state==='syncing'?'sync-dot syncing':state==='error'?'sync-dot error':'sync-dot';
  t.textContent=msg;
}

async function ghGet(p){
  const r=await fetch(`https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/${p}`,{
    headers:{'Authorization':`token ${CFG.token}`,'Accept':'application/vnd.github.v3+json'}
  });
  if(r.status===404)return null;
  if(!r.ok)throw new Error(`GH ${r.status}`);
  return r.json();
}

async function ghPut(p,c,s){
  const b={
    message:`expense update ${new Date().toISOString().slice(0,10)}`,
    content:btoa(unescape(encodeURIComponent(c))),
    branch:CFG.branch||'main'
  };
  if(s)b.sha=s;
  const r=await fetch(`https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/${p}`,{
    method:'PUT',
    headers:{'Authorization':`token ${CFG.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
    body:JSON.stringify(b)
  });
  if(!r.ok){const e=await r.json();throw new Error(e.message||`GH ${r.status}`);}
  return r.json();
}

function ghPath(m){
  if(!currentUser)return null;
  return`${(CFG.path||'expenses').replace(/\/$/,'')}/${currentUser}/expenses-${m}.json`;
}

async function syncMonth(m){
  if(!cfgOk())return;
  setSync('syncing','syncing…');
  try{
    const p=ghPath(m);
    const e=await ghGet(p);
    const l=CACHE[m]||[];
    if(e){
      const r=JSON.parse(decodeURIComponent(escape(atob(e.content.replace(/\n/g,'')))));
      const ids=new Set(r.map(x=>x.id));
      const merged=[...r,...l.filter(x=>!ids.has(x.id))];
      merged.sort((a,b)=>a.ts-b.ts);
      CACHE[m]=merged;
      saveCacheLocal();
      await ghPut(p,JSON.stringify(merged,null,2),e.sha);
    }else{
      await ghPut(p,JSON.stringify(l,null,2));
    }
    setSync('ok','synced');
    toast('Synced ✓','success');
  }catch(err){
    setSync('error','error');
    toast('Sync failed: '+err.message,'error');
    lastDebugError = err.message;
  }
  renderView();
}

async function loadMonth(m){
  if(!cfgOk())return;
  setSync('syncing','loading…');
  try{
    const e=await ghGet(ghPath(m));
    if(e){
      const d=JSON.parse(decodeURIComponent(escape(atob(e.content.replace(/\n/g,'')))));
      CACHE[m]=d;
      saveCacheLocal();
    }
    setSync('ok','synced');
  }catch(err){
    setSync('error','error');
    lastDebugError = err.message;
  }
  renderView();
}

// AUTH FUNCTIONS - PRESERVE EXACTLY
let lastDebugError = '';

async function fetchCurrentUser(){
  try {
    const res = await fetch('/api/user');
    if(!res.ok) throw new Error('Not authenticated');
    const data = await res.json();
    currentUser = data.username;
    document.getElementById('currentUsername').textContent = currentUser;
    document.getElementById('usernameDisplay').style.display = 'flex';
    return currentUser;
  } catch(err) {
    window.location.href = '/login.html';
    throw err;
  }
}

async function handleLogout(){
  try {
    await fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'logout'})
    });
  } catch(err) {
    console.error('Logout error:', err);
  }
  localStorage.clear();
  window.location.href = '/login.html';
}

function resetIdleTimer(){
  if(!idleTimer) return;
  clearTimeout(idleTimer);
  if(window.innerWidth <= 768) {
    idleTimer = setTimeout(() => {
      handleLogout();
    }, idleTimeout);
  }
}

function initIdleTimer(){
  if(window.innerWidth <= 768) {
    ['mousedown','touchstart','keydown','scroll'].forEach(evt => {
      document.addEventListener(evt, resetIdleTimer, true);
    });
    document.addEventListener('visibilitychange', () => {
      if(document.hidden) {
        clearTimeout(idleTimer);
      } else {
        resetIdleTimer();
      }
    });
    resetIdleTimer();
  }
}

function initTheme(){

// Add/Delete Expense
document.getElementById('expenseForm').addEventListener('submit', e=>{
  e.preventDefault();
  if(!selectedCategory){toast('Please select a category','error');return;}
  
  const exp={
    id:Date.now()+'_'+Math.random().toString(36).slice(2),
    date:document.getElementById('dateInput').value,
    cat:selectedCategory,
    card:document.getElementById('cardSelect').value,
    amount:parseFloat(document.getElementById('amountInput').value),
    comment:document.getElementById('descInput').value,
    ts:Date.now()
  };
  
  const m=exp.date.slice(0,7);
  if(!CACHE[m])CACHE[m]=[];
  CACHE[m].push(exp);
  saveCacheLocal();
  closeAddExpenseModal();
  
  if(m !== currentMonth) {
    currentMonth = m;
    updateMonthDisplay();
  }
  
  renderView();
  if(cfgOk())syncMonth(m);
  toast('Expense added', 'success');
});

function delEntry(id){
  if(!confirm('Delete this expense?'))return;
  for(let m in CACHE){
    CACHE[m] = CACHE[m].filter(x => x.id !== id);
  }
  saveCacheLocal();
  renderView();
  if(cfgOk())syncMonth(currentMonth);
  toast('Deleted', 'success');
}

function bulkDelete(){
  if(selectedExpenses.size === 0) return;
  if(!confirm(`Delete ${selectedExpenses.size} expense(s)?`)) return;
  
  for(let m in CACHE){
    CACHE[m] = CACHE[m].filter(x => !selectedExpenses.has(x.id));
  }
  saveCacheLocal();
  selectedExpenses.clear();
  renderView();
  if(cfgOk())syncMonth(currentMonth);
  toast(`Deleted ${selectedExpenses.size} expenses`, 'success');
}

function toggleExpenseSelection(id){
  if(selectedExpenses.has(id)){
    selectedExpenses.delete(id);
  } else {
    selectedExpenses.add(id);
  }
  renderView();
}

// Render Views
function renderView(){
  const c=document.getElementById('contentArea');
  switch(currentView){
    case'dashboard':c.innerHTML=renderDashboard();setTimeout(initDashboardCharts,100);break;
    case'expenses':c.innerHTML=renderExpenses();break;
    case'analytics':c.innerHTML=renderAnalytics();setTimeout(initAnalyticsCharts,100);break;
    case'budget':c.innerHTML=renderBudget();break;
    case'export':c.innerHTML=renderExport();break;
  }
  initLucideIcons();
}

function renderDashboard(){
  const e=CACHE[currentMonth]||[];
  const t=e.reduce((s,x)=>s+x.amount,0);
  const b=BUDGETS.monthly||50000;
  const r=b-t;
  const avg=e.length?(t/new Set(e.map(x=>x.date)).size).toFixed(0):0;
  
  // Get previous month data
  const prevMonthDate = new Date(currentMonth+'-01');
  prevMonthDate.setMonth(prevMonthDate.getMonth()-1);
  const prevMonth = prevMonthDate.toISOString().slice(0,7);
  const prevTotal = (CACHE[prevMonth]||[]).reduce((s,x)=>s+x.amount,0);
  const vsLastMonth = prevTotal > 0 ? (((t-prevTotal)/prevTotal)*100).toFixed(1) : 0;
  
  // Highest expense
  const highest = e.length ? e.reduce((max,x)=>x.amount>max.amount?x:max, e[0]) : null;
  
  // Most used category
  const catCounts = {};
  e.forEach(x=>catCounts[x.cat]=(catCounts[x.cat]||0)+1);
  const mostUsed = Object.keys(catCounts).length ? Object.keys(catCounts).reduce((a,b)=>catCounts[a]>catCounts[b]?a:b) : null;
  
  const recent=[...e].sort((a,b)=>b.ts-a.ts).slice(0,5);
  const recentHTML=recent.map(x=>`
    <div class="expense-card" style="margin-bottom:8px">
      <div class="expense-icon" style="background:${getCatColor(x.cat)}20;color:${getCatColor(x.cat)}">
        <i data-lucide="${getCatIcon(x.cat)}"></i>
      </div>
      <div class="expense-details">
        <div class="expense-name">${x.comment||x.cat}</div>
        <div class="expense-meta">${x.card} · ${formatDate(x.date)}</div>
      </div>
      <div class="expense-amount">${fmt(x.amount)}</div>
      <div class="expense-actions">
        <button onclick="delEntry('${x.id}')"><i data-lucide="trash-2"></i></button>
      </div>
    </div>
  `).join('');
  
  return`
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(t)}</div>
        <div class="stat-change ${t>b?'negative':'positive'}">${t>b?'▲':'▼'} ${Math.abs(((t/b)*100)-100).toFixed(1)}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Remaining</div>
        <div class="stat-value" style="color:${r>0?'var(--success)':'var(--danger)'}">${fmt(Math.abs(r))}</div>
        <div class="stat-change">of ${fmt(b)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg / Day</div>
        <div class="stat-value">${fmt(avg)}</div>
        <div class="stat-change">${e.length} transactions</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Budget Used</div>
        <div class="stat-value" style="color:var(--accent-primary)">${((t/b)*100).toFixed(0)}%</div>
        <div class="stat-change">${t>b*0.9?'⚠️ Near limit':''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Highest Expense</div>
        <div class="stat-value">${highest?fmt(highest.amount):'--'}</div>
        <div class="stat-change">${highest?highest.cat:''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Most Used</div>
        <div class="stat-value" style="font-size:20px">${mostUsed||'--'}</div>
        <div class="stat-change">${mostUsed?catCounts[mostUsed]+' times':''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">vs Last Month</div>
        <div class="stat-value ${vsLastMonth>0?'negative':'positive'}" style="font-size:24px">${vsLastMonth>0?'+':''}${vsLastMonth}%</div>
        <div class="stat-change">Previous: ${fmt(prevTotal)}</div>
      </div>
    </div>
    
    <div class="widget">
      <div class="widget-header">

function renderPagination(current, total, itemCount){
  const pages = [];
  
  if(total <= 7){
    for(let i=1; i<=total; i++) pages.push(i);
  } else {
    if(current <= 4){
      for(let i=1; i<=5; i++) pages.push(i);
      pages.push('...');
      pages.push(total);
    } else if(current >= total - 3){
      pages.push(1);
      pages.push('...');
      for(let i=total-4; i<=total; i++) pages.push(i);
    } else {
      pages.push(1);
      pages.push('...');
      for(let i=current-1; i<=current+1; i++) pages.push(i);
      pages.push('...');
      pages.push(total);
    }
  }
  
  return`
    <div class="pagination">
      <div class="pagination-info">
        Showing ${(current-1)*entriesPerPage+1}-${Math.min(current*entriesPerPage, itemCount)} of ${itemCount}
      </div>
      <div class="pagination-controls">
        <button ${current===1?'disabled':''} onclick="currentPage--;renderView()">
          <i data-lucide="chevron-left"></i>
        </button>
        ${pages.map(p => p === '...' 
          ? '<span style="padding:0 8px">...</span>'
          : `<button class="${p===current?'active':''}" onclick="currentPage=${p};renderView()">${p}</button>`
        ).join('')}
        <button ${current===total?'disabled':''} onclick="currentPage++;renderView()">
          <i data-lucide="chevron-right"></i>
        </button>
      </div>
    </div>
  `;
}

function importCSV(event){
  const file = event.target.files[0];
  if(!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const lines = e.target.result.split('\n').slice(1); // Skip header
      const imported = lines.filter(l=>l.trim()).map(line => {
        const [date, cat, card, amount, comment] = line.split(',');
        return {
          id: Date.now()+'_'+Math.random().toString(36).slice(2),
          date: date.trim(),
          cat: cat.trim(),
          card: card.trim(),
          amount: parseFloat(amount),
          comment: comment.replace(/^"|"$/g, '').replace(/""/g, '"'),
          ts: Date.now()
        };
      });
      
      const m = imported[0].date.slice(0,7);
      if(!CACHE[m]) CACHE[m] = [];
      CACHE[m].push(...imported);
      saveCacheLocal();
      
      if(m !== currentMonth){
        currentMonth = m;
        updateMonthDisplay();
      }
      
      renderView();
      if(cfgOk()) syncMonth(m);
      toast(`Imported ${imported.length} expenses`, 'success');
    }catch(err){
      toast('Import failed: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function initDashboardCharts(){

  let labels, data;
  
  if(trendView === 'daily'){
    const dailyTotals = {};
    e.forEach(x => {
      const d = x.date;
      dailyTotals[d] = (dailyTotals[d]||0) + x.amount;
    });
    labels = Object.keys(dailyTotals).sort();
    data = labels.map(d => dailyTotals[d]);
  } else {
    // Weekly
    const weeklyTotals = {};
    e.forEach(x => {
      const d = new Date(x.date);
      const week = Math.floor(d.getDate() / 7) + 1;
      const key = `Week ${week}`;
      weeklyTotals[key] = (weeklyTotals[key]||0) + x.amount;
    });
    labels = Object.keys(weeklyTotals);
    data = labels.map(w => weeklyTotals[w]);
  }
  
  new Chart(trendCanvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Spending',
        data,
        borderColor: getComputedStyle(document.documentElement).getPropertyValue('--accent-primary'),

        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {legend: {display: false}}
    }

  // Category Chart

      plugins: {legend: {position: 'bottom'}}

  // Category Pie
  const catCanvas = document.getElementById('categoryPieChart');
  if(!catCanvas) return;
  
  const e = CACHE[currentMonth]||[];
  const catTotals = {};
  e.forEach(x => catTotals[x.cat] = (catTotals[x.cat]||0) + x.amount);
  const catLabels = Object.keys(catTotals);
  const catData = catLabels.map(c => catTotals[c]);
  const catColors = catLabels.map(c => getCatColor(c));
  
  new Chart(catCanvas, {
    type: 'pie',
    data: {
      labels: catLabels,
      datasets: [{
        data: catData,
        backgroundColor: catColors
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {legend: {position: 'right'}}
    }
  });
  
  // Card Pie
  const cardCanvas = document.getElementById('cardPieChart');
  if(!cardCanvas) return;
  
  const cardTotals = {};
  e.forEach(x => cardTotals[x.card] = (cardTotals[x.card]||0) + x.amount);
  const cardLabels = Object.keys(cardTotals);
  const cardData = cardLabels.map(c => cardTotals[c]);
  
  new Chart(cardCanvas, {
    type: 'pie',
    data: {
      labels: cardLabels,
      datasets: [{
        data: cardData,
        backgroundColor: ['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#14b8a6']
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {legend: {position: 'right'}}
    }
  });
}

// Nav Event Listeners
document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',()=>switchView(i.getAttribute('data-view'))));

// Initialize
initTheme();
updateMonthDisplay();

fetchCurrentUser().then(() => {
  initIdleTimer();
  if(cfgOk()){
    setSync('syncing','loading…');
    loadMonth(currentMonth).then(()=>renderView());
  } else {
    setSync('ok','ready');
    renderView();
  }
  initLucideIcons();
}).catch(err => {
  console.error('Auth failed:', err);
});
</script>
</body>
</html>
